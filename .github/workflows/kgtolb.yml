name: App Store Capacitor

on:
  workflow_dispatch:
    inputs:
      repository_url:
        description: "owner/repo; empty builds this repository"
        required: false
        type: string
        default: ""

      repository_branch:
        description: "Branch"
        required: false
        type: string
        default: "main"

      version:
        description: "Version, for example 1.0.0"
        required: false
        type: string
        default: "1.0.0"

      target_platform:
        description: "Target"
        required: true
        type: choice
        options:
          - all_devices
          - iphone_and_ipad
          - iphone_only
          - ipad_only
          - macos_only
        default: "all_devices"

      build_mode:
        description: "Mode"
        required: true
        type: choice
        options:
          - build_only
          - publish_to_appstore
        default: "build_only"

      npm_build_command:
        description: "Build command"
        required: false
        type: string
        default: "npm run build:capacitor"

      provisioning_profile_base64:
        description: "iOS App Store provisioning profile as base64"
        required: false
        type: string

      mac_provisioning_profile_base64:
        description: "Mac Catalyst App Store provisioning profile as base64"
        required: false
        type: string

      mac_category:
        description: "Mac App Store category UTI"
        required: false
        type: string
        default: "public.app-category.utilities"

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 90

    env:
      APP_DIR: app

    steps:
      - name: Mask inputs
        shell: bash
        run: |
          if [ -n "${{ inputs.provisioning_profile_base64 }}" ]; then
            echo "::add-mask::${{ inputs.provisioning_profile_base64 }}"
          fi
          if [ -n "${{ inputs.mac_provisioning_profile_base64 }}" ]; then
            echo "::add-mask::${{ inputs.mac_provisioning_profile_base64 }}"
          fi

      - name: Checkout current repository
        if: inputs.repository_url == ''
        uses: actions/checkout@v4
        with:
          path: app

      - name: Checkout requested repository
        if: inputs.repository_url != ''
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.repository_url }}
          ref: ${{ inputs.repository_branch }}
          token: ${{ secrets.GH_PAT }}
          path: app

      - name: Parse Apple credentials
        id: apple
        shell: bash
        env:
          APPLE_CREDS: ${{ secrets.APPLE_CREDENTIALS }}
          BUILD_MODE: ${{ inputs.build_mode }}
        run: |
          if [ -z "$APPLE_CREDS" ]; then
            if [ "$BUILD_MODE" = "publish_to_appstore" ]; then
              echo "APPLE_CREDENTIALS secret is required for publish_to_appstore." >&2
              exit 1
            fi
            {
              echo "team_id="
              echo "certificate_base64="
              echo "certificate_password="
              echo "installer_certificate_base64="
              echo "installer_certificate_password="
              echo "api_key_id="
              echo "api_issuer_id="
              echo "api_key_base64="
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          TEAM_ID=$(echo "$APPLE_CREDS" | jq -r '.team_id // empty')
          CERT_B64=$(echo "$APPLE_CREDS" | jq -r '.certificate_base64 // empty')
          CERT_PASS=$(echo "$APPLE_CREDS" | jq -r '.certificate_password // empty')
          INST_B64=$(echo "$APPLE_CREDS" | jq -r '.installer_certificate_base64 // empty')
          INST_PASS=$(echo "$APPLE_CREDS" | jq -r '.installer_certificate_password // .certificate_password // empty')
          API_KEY_ID=$(echo "$APPLE_CREDS" | jq -r '.api_key_id // empty')
          API_ISSUER=$(echo "$APPLE_CREDS" | jq -r '.api_issuer_id // empty')
          API_B64=$(echo "$APPLE_CREDS" | jq -r '.api_key_base64 // empty')

          if [ "$BUILD_MODE" = "publish_to_appstore" ]; then
            for value in "$TEAM_ID" "$CERT_B64" "$CERT_PASS" "$API_KEY_ID" "$API_ISSUER" "$API_B64"; do
              if [ -z "$value" ]; then
                echo "APPLE_CREDENTIALS is missing one or more required publish fields." >&2
                exit 1
              fi
            done
          fi

          for value in "$TEAM_ID" "$CERT_B64" "$CERT_PASS" "$INST_B64" "$INST_PASS" "$API_KEY_ID" "$API_ISSUER" "$API_B64"; do
            if [ -n "$value" ]; then echo "::add-mask::$value"; fi
          done

          {
            echo "team_id=$TEAM_ID"
            echo "certificate_base64=$CERT_B64"
            echo "certificate_password=$CERT_PASS"
            echo "installer_certificate_base64=$INST_B64"
            echo "installer_certificate_password=$INST_PASS"
            echo "api_key_id=$API_KEY_ID"
            echo "api_issuer_id=$API_ISSUER"
            echo "api_key_base64=$API_B64"
          } >> "$GITHUB_OUTPUT"

      - name: Read Capacitor config
        id: capacitor
        working-directory: app
        shell: bash
        run: |
          if [ -f "capacitor.config.json" ]; then
            CONFIG_CONTENT=$(cat capacitor.config.json)
            APP_NAME=$(echo "$CONFIG_CONTENT" | jq -r '.appName // empty')
            APP_ID=$(echo "$CONFIG_CONTENT" | jq -r '.appId // empty')
            WEB_DIR=$(echo "$CONFIG_CONTENT" | jq -r '.webDir // "www"')
          elif [ -f "capacitor.config.ts" ]; then
            APP_NAME=$(sed -n "s/.*appName:[[:space:]]*['\"]\([^'\"]*\)['\"].*/\1/p" capacitor.config.ts | head -1)
            APP_ID=$(sed -n "s/.*appId:[[:space:]]*['\"]\([^'\"]*\)['\"].*/\1/p" capacitor.config.ts | head -1)
            WEB_DIR=$(sed -n "s/.*webDir:[[:space:]]*['\"]\([^'\"]*\)['\"].*/\1/p" capacitor.config.ts | head -1)
            if [ -z "$WEB_DIR" ]; then WEB_DIR="www"; fi
          else
            echo "No Capacitor config found." >&2
            exit 1
          fi

          if [ -z "$APP_NAME" ] || [ -z "$APP_ID" ]; then
            echo "appName/appId could not be read from Capacitor config." >&2
            exit 1
          fi

          APP_NAME_SAFE=$(echo "$APP_NAME" | tr ' ' '-' | tr -cd '[:alnum:]._-')
          echo "::add-mask::$APP_ID"
          {
            echo "app_name=$APP_NAME"
            echo "app_name_safe=$APP_NAME_SAFE"
            echo "bundle_id=$APP_ID"
            echo "web_dir=$WEB_DIR"
          } >> "$GITHUB_OUTPUT"

      - name: Select Node version
        id: node_version
        working-directory: app
        shell: bash
        run: |
          NODE_VERSION=$(jq -r '.engines.node // empty' package.json 2>/dev/null | grep -Eo '[0-9]+' | head -1 || true)
          if [ -z "$NODE_VERSION" ]; then
            NODE_VERSION="22"
          fi
          echo "version=$NODE_VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.node_version.outputs.version }}
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: app
        shell: bash
        run: |
          if [ -f "package-lock.json" ]; then
            npm ci --legacy-peer-deps
          else
            npm install --legacy-peer-deps
          fi

      - name: Build web assets
        working-directory: app
        shell: bash
        run: |
          ${{ inputs.npm_build_command }}
          WEB_DIR="${{ steps.capacitor.outputs.web_dir }}"
          if [ ! -f "$WEB_DIR/index.html" ]; then
            echo "Capacitor webDir '$WEB_DIR' does not contain index.html." >&2
            echo "For this TanStack app the build command must usually be: npm run build:capacitor" >&2
            exit 1
          fi

      - name: Sync Capacitor iOS
        working-directory: app
        shell: bash
        run: |
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi
          npx cap sync ios

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install Apple build tools
        shell: bash
        run: |
          gem install fastlane xcodeproj --no-document
          if [ -f "app/ios/App/Podfile" ]; then
            gem install cocoapods --no-document
          fi

      - name: Install Pods if present
        if: hashFiles('app/ios/App/Podfile') != ''
        working-directory: app/ios/App
        shell: bash
        run: pod install

      - name: Prepare Xcode project
        working-directory: app/ios/App
        shell: bash
        env:
          BUNDLE_ID: ${{ steps.capacitor.outputs.bundle_id }}
          APP_NAME: ${{ steps.capacitor.outputs.app_name }}
          VERSION: ${{ inputs.version }}
          TARGET_PLATFORM: ${{ inputs.target_platform }}
          MAC_CATEGORY: ${{ inputs.mac_category }}
        run: |
          BUILD_NUM=$(date -u +"%Y%m%d%H%M")

          /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName $APP_NAME" App/Info.plist 2>/dev/null || \
            /usr/libexec/PlistBuddy -c "Add :CFBundleDisplayName string $APP_NAME" App/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleName $APP_NAME" App/Info.plist 2>/dev/null || \
            /usr/libexec/PlistBuddy -c "Add :CFBundleName string $APP_NAME" App/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VERSION" App/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUM" App/Info.plist
          /usr/libexec/PlistBuddy -c "Set :LSApplicationCategoryType $MAC_CATEGORY" App/Info.plist 2>/dev/null || \
            /usr/libexec/PlistBuddy -c "Add :LSApplicationCategoryType string $MAC_CATEGORY" App/Info.plist

          if [ "$TARGET_PLATFORM" = "all_devices" ] || [ "$TARGET_PLATFORM" = "macos_only" ]; then
            if [ ! -f "App/App.entitlements" ]; then
              cat > App/App.entitlements <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>com.apple.security.app-sandbox</key>
            <true/>
          </dict>
          </plist>
          EOF
            fi
            /usr/libexec/PlistBuddy -c "Add :com.apple.security.app-sandbox bool true" App/App.entitlements 2>/dev/null || \
              /usr/libexec/PlistBuddy -c "Set :com.apple.security.app-sandbox true" App/App.entitlements
          fi

          case "$TARGET_PLATFORM" in
            iphone_only) TARGET_FAMILY="1" ;;
            ipad_only) TARGET_FAMILY="2" ;;
            *) TARGET_FAMILY="1,2,6" ;;
          esac
          export TARGET_FAMILY

          ruby - <<'RUBY'
          require "xcodeproj"

          project = Xcodeproj::Project.open("App.xcodeproj")
          target = project.targets.find { |item| item.name == "App" }
          abort("App target not found") unless target

          target_platform = ENV.fetch("TARGET_PLATFORM")
          needs_catalyst = ["all_devices", "macos_only"].include?(target_platform)
          target_family = ENV.fetch("TARGET_FAMILY")

          (project.build_configurations + target.build_configurations).each do |config|
            settings = config.build_settings
            settings["IPHONEOS_DEPLOYMENT_TARGET"] = "15.0"
            settings["PRODUCT_BUNDLE_IDENTIFIER"] = ENV.fetch("BUNDLE_ID") if config.build_settings.key?("PRODUCT_BUNDLE_IDENTIFIER")
          end

          target.build_configurations.each do |config|
            settings = config.build_settings
            settings["PRODUCT_BUNDLE_IDENTIFIER"] = ENV.fetch("BUNDLE_ID")
            settings["TARGETED_DEVICE_FAMILY"] = target_family
            settings["MARKETING_VERSION"] = ENV.fetch("VERSION")
            settings["CURRENT_PROJECT_VERSION"] = Time.now.utc.strftime("%Y%m%d%H%M")

            if needs_catalyst
              settings["SUPPORTED_PLATFORMS"] = "iphoneos iphonesimulator macosx"
              settings["SUPPORTS_MACCATALYST"] = "YES"
              settings["SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD"] = "NO"
              settings["DERIVE_MACCATALYST_PRODUCT_BUNDLE_IDENTIFIER"] = "NO"
              settings["CODE_SIGN_ENTITLEMENTS[sdk=macosx*]"] = "App/App.entitlements"
            else
              settings["SUPPORTED_PLATFORMS"] = "iphoneos iphonesimulator"
              settings["SUPPORTS_MACCATALYST"] = "NO"
            end
          end

          project.save
          RUBY

      - name: Import Apple certificate
        id: cert
        if: inputs.build_mode == 'publish_to_appstore'
        shell: bash
        env:
          CERT_B64: ${{ steps.apple.outputs.certificate_base64 }}
          CERT_PASS: ${{ steps.apple.outputs.certificate_password }}
          INST_CERT_B64: ${{ steps.apple.outputs.installer_certificate_base64 }}
          INST_CERT_PASS: ${{ steps.apple.outputs.installer_certificate_password }}
          TEAM_ID: ${{ steps.apple.outputs.team_id }}
        run: |
          CERT_PATH="$RUNNER_TEMP/distribution.p12"
          INSTALLER_CERT_PATH="$RUNNER_TEMP/installer.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          echo "::add-mask::$KEYCHAIN_PASSWORD"

          echo "$CERT_B64" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$CERT_PASS" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"

          INSTALLER_CERT_NAME=""
          if [ -n "$INST_CERT_B64" ]; then
            echo "$INST_CERT_B64" | base64 --decode > "$INSTALLER_CERT_PATH"
            security import "$INSTALLER_CERT_PATH" -P "$INST_CERT_PASS" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
            INSTALLER_CERT_NAME=$(security find-identity -v -p basic "$KEYCHAIN_PATH" | grep "3rd Party Mac Developer Installer" | head -1 | sed 's/.*"\(.*\)".*/\1/')
          fi

          if [ -z "$INSTALLER_CERT_NAME" ] && [ -n "$TEAM_ID" ]; then
            INSTALLER_CERT_NAME="3rd Party Mac Developer Installer: $TEAM_ID"
          fi

          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

          echo "installer_cert_name=$INSTALLER_CERT_NAME" >> "$GITHUB_OUTPUT"

      - name: Install iOS provisioning profile
        id: ios_profile
        if: inputs.build_mode == 'publish_to_appstore' && inputs.target_platform != 'macos_only'
        shell: bash
        run: |
          if [ -z "${{ inputs.provisioning_profile_base64 }}" ]; then
            echo "iOS provisioning_profile_base64 is required for this target." >&2
            exit 1
          fi

          PP_PATH="$RUNNER_TEMP/ios.mobileprovision"
          PP_PLIST="$RUNNER_TEMP/ios-profile.plist"
          echo "${{ inputs.provisioning_profile_base64 }}" | base64 --decode > "$PP_PATH"
          security cms -D -i "$PP_PATH" > "$PP_PLIST"

          UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" "$PP_PLIST")
          NAME=$(/usr/libexec/PlistBuddy -c "Print Name" "$PP_PLIST")
          echo "::add-mask::$UUID"
          echo "::add-mask::$NAME"

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PP_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$UUID.mobileprovision"
          {
            echo "uuid=$UUID"
            echo "name=$NAME"
          } >> "$GITHUB_OUTPUT"

      - name: Install Mac Catalyst provisioning profile
        id: mac_profile
        if: inputs.build_mode == 'publish_to_appstore' && (inputs.target_platform == 'all_devices' || inputs.target_platform == 'macos_only')
        shell: bash
        run: |
          if [ -z "${{ inputs.mac_provisioning_profile_base64 }}" ]; then
            echo "mac_provisioning_profile_base64 is required for Mac Catalyst publishing." >&2
            exit 1
          fi

          PP_PATH="$RUNNER_TEMP/mac.provisionprofile"
          PP_PLIST="$RUNNER_TEMP/mac-profile.plist"
          echo "${{ inputs.mac_provisioning_profile_base64 }}" | base64 --decode > "$PP_PATH"
          security cms -D -i "$PP_PATH" > "$PP_PLIST"

          UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" "$PP_PLIST")
          NAME=$(/usr/libexec/PlistBuddy -c "Print Name" "$PP_PLIST")
          echo "::add-mask::$UUID"
          echo "::add-mask::$NAME"

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PP_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$UUID.provisionprofile"
          {
            echo "uuid=$UUID"
            echo "name=$NAME"
          } >> "$GITHUB_OUTPUT"

      - name: Apply manual signing
        if: inputs.build_mode == 'publish_to_appstore'
        working-directory: app/ios/App
        shell: bash
        env:
          TEAM_ID: ${{ steps.apple.outputs.team_id }}
          IOS_PROFILE_UUID: ${{ steps.ios_profile.outputs.uuid }}
          IOS_PROFILE_NAME: ${{ steps.ios_profile.outputs.name }}
          MAC_PROFILE_UUID: ${{ steps.mac_profile.outputs.uuid }}
          MAC_PROFILE_NAME: ${{ steps.mac_profile.outputs.name }}
          TARGET_PLATFORM: ${{ inputs.target_platform }}
        run: |
          ruby - <<'RUBY'
          require "xcodeproj"

          project = Xcodeproj::Project.open("App.xcodeproj")
          target = project.targets.find { |item| item.name == "App" }
          abort("App target not found") unless target

          target_platform = ENV.fetch("TARGET_PLATFORM")
          needs_ios = target_platform != "macos_only"
          needs_mac = ["all_devices", "macos_only"].include?(target_platform)

          target.build_configurations.each do |config|
            settings = config.build_settings
            settings["CODE_SIGN_STYLE"] = "Manual"
            settings["CODE_SIGN_IDENTITY"] = "Apple Distribution"
            settings["DEVELOPMENT_TEAM"] = ENV.fetch("TEAM_ID")
            settings["CODE_SIGNING_REQUIRED"] = "YES"
            settings["CODE_SIGNING_ALLOWED"] = "YES"

            if needs_ios
              settings["PROVISIONING_PROFILE[sdk=iphoneos*]"] = ENV.fetch("IOS_PROFILE_UUID")
              settings["PROVISIONING_PROFILE_SPECIFIER[sdk=iphoneos*]"] = ENV.fetch("IOS_PROFILE_NAME")
            end

            if needs_mac
              settings["PROVISIONING_PROFILE[sdk=macosx*]"] = ENV.fetch("MAC_PROFILE_UUID")
              settings["PROVISIONING_PROFILE_SPECIFIER[sdk=macosx*]"] = ENV.fetch("MAC_PROFILE_NAME")
              settings["CODE_SIGN_ENTITLEMENTS[sdk=macosx*]"] = "App/App.entitlements"
            end
          end

          project.save
          RUBY

      - name: Select build target
        id: platform
        shell: bash
        run: |
          IS_CATALYST="false"
          IOS_DESTINATION="generic/platform=iOS Simulator"
          MAC_DESTINATION="generic/platform=macOS,variant=Mac Catalyst"

          case "${{ inputs.target_platform }}" in
            iphone_only) TARGET_DEVICES="1" ;;
            ipad_only) TARGET_DEVICES="2" ;;
            *) TARGET_DEVICES="1,2,6" ;;
          esac

          if [ "${{ inputs.target_platform }}" = "macos_only" ]; then
            IS_CATALYST="true"
          fi
          if [ "${{ inputs.target_platform }}" = "all_devices" ]; then
            IS_CATALYST="true"
          fi

          {
            echo "is_catalyst=$IS_CATALYST"
            echo "ios_destination=$IOS_DESTINATION"
            echo "mac_destination=$MAC_DESTINATION"
            echo "target_devices=$TARGET_DEVICES"
          } >> "$GITHUB_OUTPUT"

      - name: Build without publishing
        if: inputs.build_mode == 'build_only'
        working-directory: app/ios/App
        shell: bash
        env:
          APP_NAME_SAFE: ${{ steps.capacitor.outputs.app_name_safe }}
          IOS_DESTINATION: ${{ steps.platform.outputs.ios_destination }}
          MAC_DESTINATION: ${{ steps.platform.outputs.mac_destination }}
        run: |
          set -o pipefail
          if [ -d "App.xcworkspace" ]; then
            XC_ARG="-workspace App.xcworkspace"
          else
            XC_ARG="-project App.xcodeproj"
          fi

          if [ "${{ inputs.target_platform }}" != "macos_only" ]; then
            xcodebuild $XC_ARG \
              -scheme App \
              -configuration Release \
              -destination "$IOS_DESTINATION" \
              -derivedDataPath build-ios-sim \
              CODE_SIGN_IDENTITY="-" \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGNING_ALLOWED=NO \
              2>&1 | tee build-ios-sim.log

            APP_PATH=$(find build-ios-sim -name "*.app" -type d | head -1)
            test -n "$APP_PATH"
            cp -R "$APP_PATH" "./${APP_NAME_SAFE}-iOS-Simulator.app"
            ditto -c -k --sequesterRsrc --keepParent "${APP_NAME_SAFE}-iOS-Simulator.app" "${APP_NAME_SAFE}-iOS-Simulator.app.zip"
          fi

          if [ "${{ inputs.target_platform }}" = "all_devices" ] || [ "${{ inputs.target_platform }}" = "macos_only" ]; then
            xcodebuild $XC_ARG \
              -scheme App \
              -configuration Release \
              -destination "$MAC_DESTINATION" \
              -derivedDataPath build-mac \
              SUPPORTS_MACCATALYST=YES \
              CODE_SIGN_IDENTITY="-" \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGNING_ALLOWED=YES \
              2>&1 | tee build-mac.log

            APP_PATH=$(find build-mac -name "*.app" -type d | head -1)
            test -n "$APP_PATH"
            if [ -d "$APP_PATH/Contents/Frameworks" ]; then
              find "$APP_PATH/Contents/Frameworks" -name "*.framework" -maxdepth 1 | while read -r fw; do
                codesign --force --sign - --timestamp=none --generate-entitlement-der "$fw" 2>/dev/null || true
              done
              find "$APP_PATH/Contents/Frameworks" -name "*.dylib" | while read -r dl; do
                codesign --force --sign - --timestamp=none "$dl" 2>/dev/null || true
              done
            fi
            codesign --force --sign - --deep --timestamp=none --generate-entitlement-der "$APP_PATH" 2>/dev/null || true
            cp -R "$APP_PATH" "./${APP_NAME_SAFE}-macOS.app"
            ditto -c -k --sequesterRsrc --keepParent "${APP_NAME_SAFE}-macOS.app" "${APP_NAME_SAFE}-macOS.app.zip"
          fi

      - name: Create iOS archive
        if: inputs.build_mode == 'publish_to_appstore' && inputs.target_platform != 'macos_only'
        working-directory: app/ios/App
        shell: bash
        env:
          APP_NAME_SAFE: ${{ steps.capacitor.outputs.app_name_safe }}
          TEAM_ID: ${{ steps.apple.outputs.team_id }}
          BUNDLE_ID: ${{ steps.capacitor.outputs.bundle_id }}
          IOS_PROFILE_NAME: ${{ steps.ios_profile.outputs.name }}
        run: |
          if [ -d "App.xcworkspace" ]; then
            FL_ARG="workspace:App.xcworkspace"
          else
            FL_ARG="project:App.xcodeproj"
          fi

          cat > IOSExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store</string>
            <key>teamID</key><string>$TEAM_ID</string>
            <key>signingStyle</key><string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>$BUNDLE_ID</key><string>$IOS_PROFILE_NAME</string>
            </dict>
          </dict>
          </plist>
          EOF

          fastlane run build_app \
            $FL_ARG \
            scheme:"App" \
            export_method:"app-store" \
            output_directory:"." \
            output_name:"${APP_NAME_SAFE}-iOS.ipa" \
            export_team_id:"$TEAM_ID" \
            skip_profile_detection:true \
            export_options:"IOSExportOptions.plist" \
            clean:true

      - name: Create Mac Catalyst archive
        if: inputs.build_mode == 'publish_to_appstore' && (inputs.target_platform == 'all_devices' || inputs.target_platform == 'macos_only')
        working-directory: app/ios/App
        shell: bash
        env:
          APP_NAME_SAFE: ${{ steps.capacitor.outputs.app_name_safe }}
          TEAM_ID: ${{ steps.apple.outputs.team_id }}
          BUNDLE_ID: ${{ steps.capacitor.outputs.bundle_id }}
          MAC_PROFILE_NAME: ${{ steps.mac_profile.outputs.name }}
          INSTALLER_CERT_NAME: ${{ steps.cert.outputs.installer_cert_name }}
        run: |
          if [ -d "App.xcworkspace" ]; then
            FL_ARG="workspace:App.xcworkspace"
          else
            FL_ARG="project:App.xcodeproj"
          fi

          cat > MacExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store</string>
            <key>teamID</key><string>$TEAM_ID</string>
            <key>destination</key><string>export</string>
            <key>signingStyle</key><string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>$BUNDLE_ID</key><string>$MAC_PROFILE_NAME</string>
            </dict>
          </dict>
          </plist>
          EOF

          fastlane run build_app \
            $FL_ARG \
            scheme:"App" \
            catalyst_platform:"macos" \
            output_directory:"." \
            output_name:"${APP_NAME_SAFE}-Mac" \
            installer_cert_name:"$INSTALLER_CERT_NAME" \
            skip_profile_detection:true \
            export_options:"MacExportOptions.plist" \
            clean:true

      - name: Upload to App Store Connect
        if: inputs.build_mode == 'publish_to_appstore'
        working-directory: app/ios/App
        shell: bash
        env:
          APP_NAME_SAFE: ${{ steps.capacitor.outputs.app_name_safe }}
          BUNDLE_ID: ${{ steps.capacitor.outputs.bundle_id }}
          TEAM_ID: ${{ steps.apple.outputs.team_id }}
          API_KEY_ID: ${{ steps.apple.outputs.api_key_id }}
          API_ISSUER_ID: ${{ steps.apple.outputs.api_issuer_id }}
          API_KEY_BASE64: ${{ steps.apple.outputs.api_key_base64 }}
        run: |
          API_KEY_PATH="$RUNNER_TEMP/appstore-api-key.json"
          API_KEY_CONTENT=$(echo "$API_KEY_BASE64" | base64 --decode)

          jq -n \
            --arg key_id "$API_KEY_ID" \
            --arg issuer_id "$API_ISSUER_ID" \
            --arg key "$API_KEY_CONTENT" \
            '{key_id: $key_id, issuer_id: $issuer_id, key: $key, in_house: false}' > "$API_KEY_PATH"

          if [ -f "${APP_NAME_SAFE}-iOS.ipa" ]; then
            fastlane run upload_to_app_store \
              api_key_path:"$API_KEY_PATH" \
              app_identifier:"$BUNDLE_ID" \
              team_id:"$TEAM_ID" \
              ipa:"${APP_NAME_SAFE}-iOS.ipa" \
              platform:"ios" \
              skip_metadata:true \
              skip_screenshots:true \
              run_precheck_before_submit:false \
              submit_for_review:false
          fi

          MAC_FILE=""
          MAC_TYPE=""
          if [ -f "${APP_NAME_SAFE}-Mac.pkg" ]; then
            MAC_FILE="${APP_NAME_SAFE}-Mac.pkg"
            MAC_TYPE="pkg"
          elif [ -f "${APP_NAME_SAFE}-Mac.ipa" ]; then
            MAC_FILE="${APP_NAME_SAFE}-Mac.ipa"
            MAC_TYPE="ipa"
          fi

          if [ -n "$MAC_FILE" ]; then
            if [ "$MAC_TYPE" = "pkg" ]; then
              fastlane run upload_to_app_store \
                api_key_path:"$API_KEY_PATH" \
                app_identifier:"$BUNDLE_ID" \
                team_id:"$TEAM_ID" \
                pkg:"$MAC_FILE" \
                platform:"osx" \
                skip_metadata:true \
                skip_screenshots:true \
                run_precheck_before_submit:false \
                submit_for_review:false \
                skip_app_version_update:true
            else
              fastlane run upload_to_app_store \
                api_key_path:"$API_KEY_PATH" \
                app_identifier:"$BUNDLE_ID" \
                team_id:"$TEAM_ID" \
                ipa:"$MAC_FILE" \
                platform:"osx" \
                skip_metadata:true \
                skip_screenshots:true \
                run_precheck_before_submit:false \
                submit_for_review:false
            fi
          fi

      - name: Upload build-only artifacts
        if: inputs.build_mode == 'build_only'
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ inputs.target_platform }}-${{ github.run_number }}
          path: |
            app/ios/App/*-iOS-Simulator.app.zip
            app/ios/App/*-macOS.app.zip
          retention-days: 3
          if-no-files-found: error

      - name: Collect failure summary
        if: failure()
        shell: bash
        run: |
          ERROR_FILE="$RUNNER_TEMP/error-summary.txt"
          echo "$(date -u '+%Y-%m-%d %H:%M UTC')" > "$ERROR_FILE"
          echo "" >> "$ERROR_FILE"

          SEARCH_DIRS="app/ios/App $HOME/Library/Logs/gym /tmp"
          for DIR in $SEARCH_DIRS; do
            find "$DIR" -name "*.log" -o -name "*.txt" 2>/dev/null | head -40 | while read -r file; do
              grep -iHn -E "(error:|fatal|undefined symbol|linker|ld: |clang:|BUILD FAILED|provisioning|signing|codesign|entitlement)" "$file" 2>/dev/null | tail -50 >> "$ERROR_FILE" || true
            done
          done

          sort -u -o "$ERROR_FILE" "$ERROR_FILE"
          cat "$ERROR_FILE"
          echo "error_summary_path=$ERROR_FILE" >> "$GITHUB_ENV"

      - name: Upload failure summary
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: errors-${{ github.run_number }}
          path: ${{ env.error_summary_path }}
          retention-days: 3
          if-no-files-found: ignore

      - name: Upload failure logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ github.run_number }}
          path: |
            app/ios/App/build*/**/*.log
            app/ios/App/*.log
            ~/Library/Logs/gym/*.log
          retention-days: 3
          if-no-files-found: ignore

      - name: Summary
        if: always()
        shell: bash
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "### Build succeeded" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### Build failed" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "- App: ${{ steps.capacitor.outputs.app_name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Bundle ID: ${{ steps.capacitor.outputs.bundle_id }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Target: ${{ inputs.target_platform }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Mode: ${{ inputs.build_mode }}" >> "$GITHUB_STEP_SUMMARY"
